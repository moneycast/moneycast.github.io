<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remesas PWA</title>
  <meta name="description" content="Aplicación de remesas PWA, responsive y optimizada para GitHub Pages" />
  <link rel="manifest" href="manifest.json" />
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v4.0.2/dist/tesseract.min.js"></script>
  <script>
    // Tailwind config for custom colors / dark mode if needed
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            primary: '#0d9488', // teal-600 as primary example
          },
        },
      },
    };
  </script>
  <!-- Material Symbols Minimalist Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
  <style>
    /* Subtle dot pattern background */
    body {
      background-image: radial-gradient(#0d948822 1px, transparent 1px);
      background-size: 24px 24px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-image: radial-gradient(#ffffff15 1px, transparent 1px);
      }
    }
  </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex flex-col relative">
  <div id="app" class="flex-1 flex flex-col"></div>
  <script src="src/app.js"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.error('SW registration failed', err));
    }
  </script>
</body>
</html>
