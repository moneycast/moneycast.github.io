<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyCast - Remesas y Recargas</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="./assets/icons/icon-512x512.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // Verde esmeralda
                        'primary-dark': '#047857',
                        gold: '#d4af37', // Dorado
                        'gold-light': '#f3e5ab',
                        'gold-dark': '#aa8a29',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- App Header -->
    <header class="bg-primary text-white shadow-md z-10 relative">
        <div class="px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="zap" class="text-gold w-6 h-6"></i>
                <span class="text-gold tracking-wide">Money</span>Cast
            </h1>
            <button id="btn-sync" class="p-2 bg-primary-dark rounded-full hover:bg-opacity-80 transition">
                <i data-lucide="refresh-cw" class="w-5 h-5 text-gold-light"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto pb-20 relative">
        
        <!-- View: Sales (Ventas) -->
        <section id="view-sales" class="view-section block p-4 fade-in">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 border-b-2 border-gold inline-block pb-1">Nueva Orden</h2>
            
            <div id="sales-services-list" class="grid grid-cols-1 gap-4 mb-6">
                <!-- Services will be injected here -->
            </div>

            <!-- Cart Summary -->
            <div class="bg-white rounded-xl shadow-lg p-5 mt-4 border-t-4 border-primary">
                <h3 class="text-lg font-semibold mb-3 flex items-center gap-2">
                    <i data-lucide="shopping-cart" class="text-primary w-5 h-5"></i> Resumen del Pedido
                </h3>
                <ul id="cart-items" class="space-y-2 mb-4 text-sm">
                    <!-- Cart items will be injected here -->
                    <li class="text-gray-500 italic">Carrito vacío</li>
                </ul>
                <div class="flex justify-between font-bold text-lg border-t pt-2 mb-4">
                    <span>Total:</span>
                    <span id="cart-total" class="text-primary">$0.00</span>
                </div>

                <!-- Delivery Toggle -->
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg mb-4 border border-gray-200">
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" class="text-gold-dark w-5 h-5"></i>
                        <span class="font-medium text-gray-700">Solicitar Delivery</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="toggle-delivery" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
                
                <div id="location-status" class="text-xs text-center mb-4 hidden">
                    <span class="text-primary flex items-center justify-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> Ubicación obtenida</span>
                </div>

                <button id="btn-checkout" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="send" class="w-5 h-5"></i> Enviar por WhatsApp
                </button>
            </div>
        </section>

        <!-- View: CRUD (Servicios) -->
        <section id="view-crud" class="view-section hidden p-4 fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-gold inline-block pb-1">Gestión de Servicios</h2>
                <button id="btn-add-service" class="bg-primary text-white p-2 rounded-lg shadow hover:bg-primary-dark transition">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Add/Edit Form Modal -->
            <div id="modal-service" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden transform transition-all scale-95 opacity-0" id="modal-content">
                    <div class="bg-primary text-white px-4 py-3 flex justify-between items-center">
                        <h3 id="modal-title" class="font-bold text-lg">Nuevo Servicio</h3>
                        <button id="btn-close-modal" class="text-white hover:text-gold-light transition"><i data-lucide="x"></i></button>
                    </div>
                    <form id="form-service" class="p-5">
                        <input type="hidden" id="service-id">
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2" for="service-name">Nombre del Servicio</label>
                            <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" id="service-name" type="text" placeholder="Ej. Recarga Movistar" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2" for="service-category">Categoría</label>
                            <select class="shadow-sm border rounded w-full py-2 px-3 text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" id="service-category" required>
                                <option value="Recarga">Recarga</option>
                                <option value="Remesa">Remesa</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-700 text-sm font-bold mb-2" for="service-price">Precio Base ($)</label>
                            <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" id="service-price" type="number" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="flex items-center justify-end">
                            <button class="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded mr-2 hover:bg-gray-300 transition" type="button" id="btn-cancel-modal">
                                Cancelar
                            </button>
                            <button class="bg-primary hover:bg-primary-dark text-white font-bold py-2 px-6 rounded shadow transition" type="submit">
                                Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List of Services -->
            <div id="crud-services-list" class="grid grid-cols-1 gap-3">
                <!-- Services injected here -->
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full z-20 pb-safe">
        <ul class="flex justify-around items-center h-16">
            <li class="flex-1">
                <button class="nav-btn w-full h-full flex flex-col items-center justify-center text-primary transition-colors" data-target="view-sales">
                    <i data-lucide="store" class="w-6 h-6 mb-1"></i>
                    <span class="text-xs font-medium">Ventas</span>
                </button>
            </li>
            <li class="flex-1 relative">
                <div class="absolute -top-6 left-1/2 transform -translate-x-1/2">
                    <div class="bg-primary p-3 rounded-full shadow-lg border-4 border-white">
                        <i data-lucide="wallet" class="w-6 h-6 text-gold"></i>
                    </div>
                </div>
            </li>
            <li class="flex-1">
                <button class="nav-btn w-full h-full flex flex-col items-center justify-center text-gray-400 hover:text-primary transition-colors" data-target="view-crud">
                    <i data-lucide="settings-2" class="w-6 h-6 mb-1"></i>
                    <span class="text-xs font-medium">Servicios</span>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Scripts -->
    <script src="./assets/js/store.js"></script>
    <script src="./assets/js/utils/whatsapp.js"></script>
    <script src="./assets/js/views/crud.js"></script>
    <script src="./assets/js/views/sales.js"></script>
    <script src="./assets/js/app.js"></script>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
