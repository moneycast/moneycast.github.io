<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardScan Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        .icon-btn { @apply flex flex-col items-center justify-center p-2 text-slate-400 hover:text-emerald-400 transition-colors; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 pb-24">

    <div id="install-banner" class="hidden bg-emerald-600 p-3 text-center text-sm font-bold shadow-lg sticky top-0 z-50">
        <button id="btn-install">¿Quieres instalar CardScan Pro? (Instalar App)</button>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        <h1 class="text-xl font-bold text-emerald-400 text-center py-2">CardScan Pro</h1>
        
        <div class="relative w-full h-48 bg-black rounded-xl overflow-hidden border border-slate-700">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <label class="absolute top-2 right-2 bg-slate-900/80 p-2 rounded-full cursor-pointer hover:bg-slate-700 transition z-10 border border-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <input type="file" id="file-input" accept="image/*" class="hidden">
            </label>
            <div id="ocr-loading" class="absolute inset-0 bg-black/80 flex items-center justify-center hidden">
                <span class="text-emerald-400 font-bold animate-pulse">Procesando...</span>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
            <label class="text-[10px] text-slate-400 uppercase font-bold">Número de Tarjeta</label>
            <input type="text" id="card-input" placeholder="0000 0000 0000 0000" class="w-full bg-transparent text-xl font-mono text-emerald-400 focus:outline-none mt-1">
        </div>

        <div class="grid grid-cols-2 gap-2">
            <input type="tel" id="client-phone" placeholder="Tel. Cliente" class="p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm storage-input">
        </div>
            <div class="flex gap-2">
                <input type="number" id="amount" placeholder="Monto" class="flex-grow p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm">
                <input type="text" id="amount-suffix" placeholder="USD" class="w-16 p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm text-center">
            </div>
        <input type="tel" id="whatsapp-dest" placeholder="WhatsApp Destino" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm storage-input">

        <div class="flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-slate-700">
            <span class="text-sm">Envío por separado</span>
            <input type="checkbox" id="mode-toggle" class="w-6 h-6 accent-emerald-500">
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around items-center p-3 z-50">
        <button id="btn-scan" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button id="btn-send" class="bg-emerald-600 p-4 rounded-full -mt-8 border-4 border-slate-950 shadow-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
        <button id="btn-clear" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
    </nav>

    <script>
        let deferredPrompt;
        let queue = [];
        let queueIdx = 0;
        const inputs = ['card-input', 'client-phone', 'amount', 'amount-suffix', 'whatsapp-dest'];
        
        window.addEventListener('load', () => {
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if(localStorage.getItem(id)) el.value = localStorage.getItem(id);
                el.addEventListener('input', () => localStorage.setItem(id, el.value));
            });
            initCamera();
        });

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-banner').classList.remove('hidden'); });
        document.getElementById('btn-install').onclick = async () => { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } };

        async function initCamera() { try { const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); document.getElementById('video').srcObject = stream; } catch (e) { console.error(e); } }
        
        async function processImageSource(source) {
            document.getElementById('ocr-loading').classList.remove('hidden');
            const img = new Image();
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const match = text.replace(/[\s-]/g, '').match(/\d{13,19}/);
                if(match) {
                    document.getElementById('card-input').value = match[0].replace(/.{4}/g, '$& ').trim();
                    localStorage.setItem('card-input', document.getElementById('card-input').value);
                }
                document.getElementById('ocr-loading').classList.add('hidden');
            };
            img.src = source;
        }

        document.getElementById('btn-scan').onclick = async () => {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            await processImageSource(canvas.toDataURL('image/png'));
        };

        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => processImageSource(event.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };

        const clearAll = () => {
            inputs.forEach(id => { document.getElementById(id).value = ''; localStorage.removeItem(id); });
            queue = []; queueIdx = 0; document.getElementById('btn-send').innerHTML = `<svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>`;
        };

        document.getElementById('btn-clear').onclick = clearAll;

        document.getElementById('btn-send').onclick = () => {
            const card = document.getElementById('card-input').value.trim();
            const clientPhone = document.getElementById('client-phone').value.trim();
            const amount = document.getElementById('amount').value.trim() + " " + document.getElementById('amount-suffix').value.trim();
            const dest = document.getElementById('whatsapp-dest').value.replace(/\D/g, '');
            const modeToggle = document.getElementById('mode-toggle');
            const btnSend = document.getElementById('btn-send');
            
            if (modeToggle.checked) {
                if (queue.length === 0) {
                    queue = [clientPhone, card, amount].filter(val => val.trim() !== "");
                    queue.push('----------');
                }
                if (queueIdx < queue.length) {
                    window.open(`https://api.whatsapp.com/send?phone=${dest}&text=${encodeURIComponent(queue[queueIdx])}`, '_blank');
                    queueIdx++;
                    btnSend.innerHTML = `<span class="text-[10px] font-bold text-white">${queueIdx}/${queue.length}</span>`;
                    if (queueIdx === queue.length) { 
                        clearAll(); 
                    }
                } else {
                    btnSend.innerHTML = `<svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>`;
                }
            } else {
                const msg = [clientPhone, card, amount, '----------'].filter(val => val.trim() !== "").join('\n');
                window.open(`https://api.whatsapp.com/send?phone=${dest}&text=${encodeURIComponent(msg)}`, '_blank');
                clearAll();
            }
        };
    </script>
</body>
</html>
