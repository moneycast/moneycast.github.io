<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardScan Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 pb-24">

    <div class="max-w-md mx-auto p-4 space-y-4">
        <h1 class="text-xl font-bold text-emerald-400 text-center py-2">CardScan Pro</h1>
        
        <!-- Visor -->
        <div class="relative w-full h-48 bg-black rounded-xl overflow-hidden border border-slate-700">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <div id="ocr-loading" class="absolute inset-0 bg-black/80 flex items-center justify-center hidden">
                <span class="text-emerald-400 font-bold">Procesando...</span>
            </div>
        </div>

        <!-- Campo Tarjeta (Ahora editable) -->
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
            <label class="text-[10px] text-slate-400 uppercase font-bold">Número de Tarjeta</label>
            <input type="text" id="card-input" placeholder="0000 0000 0000 0000" 
                   class="w-full bg-transparent text-xl font-mono text-emerald-400 focus:outline-none mt-1">
        </div>

        <!-- Inputs Datos -->
        <div class="grid grid-cols-2 gap-3">
            <input type="tel" id="client-phone" placeholder="Tel. Cliente" class="p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm">
            <input type="number" id="amount" placeholder="Monto" class="p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm">
        </div>
        <input type="tel" id="whatsapp-dest" placeholder="WhatsApp Destino (Opcional)" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-sm">
    </div>

    <!-- Barra Navegación Flotante -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around items-center p-3 z-50">
        <button id="btn-scan" class="flex flex-col items-center text-slate-400 hover:text-emerald-400">
            <span class="text-xs font-bold">📸 Escanear</span>
        </button>
        <button id="btn-send" class="bg-emerald-600 p-4 rounded-full -mt-8 border-4 border-slate-950 shadow-xl">
            <span class="text-white font-bold">Enviar</span>
        </button>
        <button id="btn-clear" class="flex flex-col items-center text-slate-400 hover:text-rose-400">
            <span class="text-xs font-bold">🧹 Limpiar</span>
        </button>
    </nav>

    <script>
        const video = document.getElementById('video'), canvas = document.createElement('canvas');
        const cardInput = document.getElementById('card-input'), btnScan = document.getElementById('btn-scan');
        const btnClear = document.getElementById('btn-clear'), btnSend = document.getElementById('btn-send');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (e) { console.error(e); }
        }

        btnScan.onclick = async () => {
            document.getElementById('ocr-loading').classList.remove('hidden');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const match = text.replace(/[\s-]/g, '').match(/\d{13,19}/);
            if(match) cardInput.value = match[0].replace(/.{4}/g, '$& ').trim();
            document.getElementById('ocr-loading').classList.add('hidden');
        };

        btnClear.onclick = () => {
            document.querySelectorAll('input').forEach(i => i.value = '');
        };

        btnSend.onclick = () => {
            const card = cardInput.value.trim();
            const phone = document.getElementById('client-phone').value.trim();
            const amount = document.getElementById('amount').value.trim();
            const dest = document.getElementById('whatsapp-dest').value.trim();
            
            const msg = [phone, card, amount, "----------"].filter(Boolean).join('\n');
            const url = `https://api.whatsapp.com/send?phone=${dest.replace(/\D/g, '')}&text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        };

        window.onload = initCamera;
    </script>
</body>
</html>
